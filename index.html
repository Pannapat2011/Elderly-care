<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>หน้าจอคุณตา (Smart Display - Save Data)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { 
            --bg: #F1F5F9; --text: #1E293B; --card: #FFFFFF; 
            --primary: #3B82F6; --success: #10B981; --danger: #EF4444; --warning: #F59E0B;
        }
        body.night-mode { 
            --bg: #0B0F1A; --text: #F8FAFC; --card: #161C2D; 
            --primary: #60A5FA; --success: #34D399;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; user-select: none; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; transition: 0.8s; overflow: hidden; }

        .dashboard { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 30px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .header { text-align: center; margin-top: 20px; }
        .clock { font-size: 100px; font-weight: 800; line-height: 1; color: var(--primary); letter-spacing: -2px; }
        .date-text { font-size: 26px; font-weight: 400; color: #64748B; margin-top: 10px; }
        body.night-mode .date-text { color: #94A3B8; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: 0.4s; border: 1px solid rgba(148, 163, 184, 0.1); }
        .card-icon { font-size: 24px; margin-bottom: 15px; color: var(--primary); }
        .card-title { font-size: 18px; color: #64748B; font-weight: 600; margin-bottom: 5px; }
        .card-value { font-size: 26px; font-weight: 800; color: var(--text); word-break: break-word; }

        .action-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: auto; }
        .btn-action { background: var(--card); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 20px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .btn-action:active { transform: scale(0.95); background: #E2E8F0; }
        body.night-mode .btn-action:active { background: #1E293B; }
        
        .btn-icon { font-size: 32px; color: var(--primary); }
        .btn-text { font-size: 18px; font-weight: 600; color: var(--text); }
        .btn-sos { background: linear-gradient(135deg, #EF4444, #B91C1C); color: white; border: none; }
        .btn-sos .btn-icon, .btn-sos .btn-text { color: white; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: var(--card); padding: 50px; border-radius: 30px; text-align: center; max-width: 600px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
        .modal-text { font-size: 36px; font-weight: 800; margin: 30px 0; color: var(--text); }
        .btn-ack { background: var(--primary); color: white; border: none; padding: 20px 50px; font-size: 24px; font-weight: 600; border-radius: 100px; cursor: pointer; }
        
        #screensaver { display: none; position: fixed; inset: 0; z-index: 900; background-color: black; background-size: cover; background-position: center; animation: fadeIn 2s; }
        #video-overlay { padding: 0; background: black; }
        #jitsi-container { width: 100%; height: 100%; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="screensaver"></div>
    <div id="alert-overlay" class="overlay">
        <div class="modal">
            <i class="fa-solid fa-envelope-open-text" style="font-size: 80px; color: var(--warning);"></i>
            <div class="modal-text" id="alert-msg">ข้อความใหม่</div>
            <button class="btn-ack" onclick="acknowledgeAlert()">รับทราบครับ</button>
        </div>
    </div>
    <div id="video-overlay" class="overlay"><div id="jitsi-container"></div></div>

    <div class="dashboard">
        <div class="header">
            <div class="clock" id="clock">00:00</div>
            <div class="date-text" id="date-display">กำลังโหลดวันที่...</div>
        </div>

        <div class="info-grid">
            <div class="card">
                <div class="card-icon"><i class="fa-solid fa-pills"></i></div>
                <div class="card-title">ยาที่ต้องทาน</div>
                <div class="card-value" id="disp-pill">- รออัปเดต -</div>
            </div>
            <div class="card">
                <div class="card-icon" style="color: var(--warning);"><i class="fa-regular fa-calendar-check"></i></div>
                <div class="card-title">นัดหมายถัดไป</div>
                <div class="card-value" id="disp-appoint">- รออัปเดต -</div>
            </div>
        </div>

        <div class="action-bar">
            <div class="btn-action" onclick="drinkWater()">
                <i class="fa-solid fa-glass-water btn-icon" style="color: #0EA5E9;"></i>
                <span class="btn-text" id="water-count">ดื่มน้ำ (0)</span>
            </div>
            <div class="btn-action" onclick="takePill()">
                <i class="fa-solid fa-check-double btn-icon" style="color: var(--success);"></i>
                <span class="btn-text">ทานยาแล้ว</span>
            </div>
            <div class="btn-action" onclick="toggleMusic()">
                <i class="fa-solid fa-radio btn-icon" style="color: #8B5CF6;"></i>
                <span class="btn-text">ฟังเพลง</span>
            </div>
            <div class="btn-action btn-sos" onclick="triggerSOS()">
                <i class="fa-solid fa-shield-heart btn-icon"></i>
                <span class="btn-text">ฉุกเฉิน SOS</span>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_ID = "FAMILY_001_VIP"; 
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        
        let waterCount = 0;
        let jitsiApi = null;
        let idleSeconds = 0;
        let isMusicPlaying = false;
        let audio = new Audio("https://listen.radioking.com/radio/15684/stream/29964"); 
        let photos = ["https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=1000&q=80"];
        let photoIndex = 0;

        // 🌟 โหลดข้อมูลเดิมที่จำไว้ตอนเปิดหน้าเว็บ 🌟
        window.onload = () => {
            if(localStorage.getItem('pill')) document.getElementById('disp-pill').innerText = localStorage.getItem('pill');
            if(localStorage.getItem('appoint')) document.getElementById('disp-appoint').innerText = localStorage.getItem('appoint');
            if(localStorage.getItem('waterCount')) {
                waterCount = parseInt(localStorage.getItem('waterCount'));
                document.getElementById('water-count').innerText = `ดื่มน้ำ (${waterCount})`;
            }
            if(localStorage.getItem('photos')) photos = JSON.parse(localStorage.getItem('photos'));
        };

        function updateDateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-display').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            const hour = now.getHours();
            if(hour >= 18 || hour < 6) document.body.classList.add('night-mode');
            else document.body.classList.remove('night-mode');

            idleSeconds++;
            if(idleSeconds > 45) { 
                const ss = document.getElementById('screensaver');
                if(ss.style.display !== 'block') { ss.style.display = 'block'; changePhoto(); }
            }
        }
        setInterval(updateDateTime, 1000);
        updateDateTime(); 
        setInterval(changePhoto, 15000);

        function changePhoto() {
            if(photos.length === 0) return;
            document.getElementById('screensaver').style.backgroundImage = `url('${photos[photoIndex]}')`;
            photoIndex = (photoIndex + 1) % photos.length;
        }

        document.body.addEventListener('click', () => { 
            idleSeconds = 0; 
            document.getElementById('screensaver').style.display = 'none';
            if(window.speechSynthesis) window.speechSynthesis.getVoices(); 
        });

        function speak(txt) {
            if('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(txt);
                msg.lang = 'th-TH'; window.speechSynthesis.speak(msg);
            }
        }

        client.on('connect', () => {
            client.subscribe(`familycare/${SYSTEM_ID}/command/#`);
            setInterval(() => client.publish(`familycare/${SYSTEM_ID}/status/heartbeat`, 'online'), 5000);
        });

        client.on('message', (topic, message) => {
            const payload = message.toString();
            const action = topic.split('/').pop();
            idleSeconds = 0; 

            // 🌟 อัปเดตหน้าจอพร้อมเซฟลงความจำเครื่องทันที 🌟
            if(action === 'pill') { 
                document.getElementById('disp-pill').innerText = payload; 
                localStorage.setItem('pill', payload); 
                speak("อัปเดตตารางยาใหม่ครับ"); 
            }
            else if(action === 'appoint') { 
                document.getElementById('disp-appoint').innerText = payload; 
                localStorage.setItem('appoint', payload); 
                speak("อัปเดตนัดหมายครับ"); 
            }
            else if(action === 'photo') { 
                if(!photos.includes(payload)) {
                    photos.push(payload); 
                    localStorage.setItem('photos', JSON.stringify(photos)); 
                    speak("ลูกหลานส่งรูปมาให้ดูครับ"); 
                }
            }
            else if(action === 'alert') {
                document.getElementById('alert-msg').innerText = payload;
                document.getElementById('alert-overlay').style.display = 'flex';
                speak(payload);
            }
            else if(action === 'video') {
                if(payload === 'start') {
                    document.getElementById('video-overlay').style.display = 'flex';
                    speak("ลูกหลานกำลังเปิดกล้องครับ");
                    jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Room_" + SYSTEM_ID, parentNode: document.getElementById('jitsi-container'), width: "100%", height: "100%" });
                } else {
                    if(jitsiApi) jitsiApi.dispose();
                    document.getElementById('video-overlay').style.display = 'none';
                }
            }
        });

        function drinkWater() {
            waterCount++; 
            document.getElementById('water-count').innerText = `ดื่มน้ำ (${waterCount})`;
            localStorage.setItem('waterCount', waterCount); // เซฟค่าน้ำ
            speak("ดื่มน้ำเก่งมากครับ"); 
            client.publish(`familycare/${SYSTEM_ID}/status/water`, waterCount.toString());
        }

        function takePill() {
            speak("บันทึกว่าทานยาแล้วครับ"); 
            client.publish(`familycare/${SYSTEM_ID}/status/pill_taken`, 'yes');
        }

        function toggleMusic() {
            if(isMusicPlaying) { audio.pause(); speak("ปิดเพลงแล้วครับ"); } 
            else { audio.play(); speak("เปิดเพลงให้ฟังครับ"); }
            isMusicPlaying = !isMusicPlaying;
        }

        function acknowledgeAlert() {
            document.getElementById('alert-overlay').style.display = 'none';
            client.publish(`familycare/${SYSTEM_ID}/status/read_receipt`, 'คุณตากดรับทราบข้อความแล้ว');
        }

        function triggerSOS() {
            speak("กำลังส่งสัญญาณขอความช่วยเหลือ");
            client.publish(`familycare/${SYSTEM_ID}/status/sos`, 'EMERGENCY');
            alert("ส่งสัญญาณฉุกเฉินเรียบร้อย!");
        }
    </script>
</body>
</html>
