<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elderly Care - Super App (ULTIMATE)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        @font-face { font-family: 'mainfront'; src: local('mainfront'); }
        :root { --bg-color: #F8FAFC; --card-bg: #FFFFFF; --primary: #2563EB; --sos-color: #EF4444; --video-color: #10B981; --text-main: #0F172A; --text-sub: #475569; --radius-large: 28px; --radius-medium: 20px; --radius-small: 16px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'mainfront', 'Prompt', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 20px; padding-bottom: 150px; background-image: radial-gradient(#E2E8F0 1px, transparent 1px); background-size: 20px 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: linear-gradient(135deg, var(--primary), #3B82F6); padding: 20px; border-radius: var(--radius-large); color: white; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2); }
        .greeting h1 { font-size: 32px; font-weight: 900; }
        .greeting p { font-size: 18px; font-weight: 600; opacity: 0.9; }
        .clock-box { text-align: right; }
        .time-text { font-size: 36px; font-weight: 900; line-height: 1; }
        .date-text { font-size: 16px; font-weight: 600; opacity: 0.9; }
        
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .card { background: var(--card-bg); border-radius: var(--radius-large); padding: 20px; border: 2px solid #E2E8F0; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card-wide { grid-column: span 2; }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 24px; font-weight: 900; color: var(--text-main); border-bottom: 3px dashed #E2E8F0; padding-bottom: 10px;}
        
        .pill-item { display: flex; align-items: center; background: linear-gradient(to right, #FFF7ED, #FFEDD5); padding: 20px; border-radius: var(--radius-medium); border: 2px solid #FDBA74; gap: 16px; }
        .pill-img { width: 60px; height: 60px; border-radius: 16px; background: url('https://cdn-icons-png.flaticon.com/512/883/883356.png') center/cover; }
        .pill-info { display: flex; flex-direction: column; flex-grow: 1; }
        .pill-title { font-weight: 900; font-size: 24px; color: #9A3412; }
        .btn-pill { border: none; background: #059669; color: white; padding: 15px 25px; border-radius: var(--radius-small); font-weight: 900; font-size: 20px; cursor: pointer; box-shadow: 0 4px 0 #047857; transition: 0.1s; }
        .btn-pill:active { transform: translateY(4px); box-shadow: none; }

        .appointment-box { background: var(--primary); color: white; padding: 20px; border-radius: var(--radius-medium); display: flex; justify-content: space-between; align-items: center; }
        .btn-ride { background: #FCD34D; color: #92400E; border: none; padding: 12px 20px; border-radius: var(--radius-small); font-weight: 900; font-size: 18px; cursor: pointer; display: flex; gap: 8px; box-shadow: 0 4px 0 #D97706; }

        .gallery-container { width: 100%; height: 200px; border-radius: var(--radius-medium); background-color: #E2E8F0; background-position: center; background-size: cover; background-image: url('https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=800&q=80'); border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .mood-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #F8FAFC; border: 3px solid #E2E8F0; border-radius: var(--radius-medium); padding: 20px 5px; cursor: pointer; transition: 0.2s; }
        .mood-btn:active { transform: scale(0.95); background: #E2E8F0; }
        .mood-btn.selected { background: #FEF3C7; border-color: #F59E0B; }
        .mood-emoji { font-size: 50px; line-height: 1; margin-bottom: 10px; }
        .mood-text { font-size: 18px; font-weight: 900; color: var(--text-sub); }

        /* ปุ่มเกม */
        .btn-game { width: 100%; background: linear-gradient(135deg, #EC4899, #BE185D); color: white; border: none; padding: 20px; border-radius: var(--radius-medium); font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; box-shadow: 0 6px 0 #9D174D; margin-top: 10px; }
        .btn-game:active { transform: translateY(6px); box-shadow: none; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; gap: 15px; align-items: flex-end; z-index: 50; border-top: 2px solid #E2E8F0; }
        .btn-call-main { flex-grow: 1; background: linear-gradient(135deg, #10B981, #059669); color: white; border: none; height: 100px; border-radius: 50px; font-size: 28px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; box-shadow: 0 8px 0 #047857; text-transform: uppercase; }
        .btn-sos-main { width: 120px; flex-shrink: 0; background: linear-gradient(135deg, #EF4444, #DC2626); color: white; border: none; height: 100px; border-radius: 50px; font-size: 20px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; box-shadow: 0 8px 0 #991B1B; }
        
        .btn-call-main:active, .btn-sos-main:active { transform: translateY(8px); box-shadow: none; }

        #video-modal, #game-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0F172A; z-index: 10000; flex-direction: column; }
        .video-header { padding: 20px; background: #1E293B; display: flex; justify-content: space-between; align-items: center; }
        #jitsi-container { flex-grow: 1; width: 100%; }
        
        /* Game Styles */
        #game-board { flex-grow: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 30px; background: #F1F5F9; align-content: center; justify-content: center; }
        .memory-card { background: var(--primary); border-radius: 16px; height: 120px; display: flex; align-items: center; justify-content: center; font-size: 60px; cursor: pointer; transition: 0.3s; transform-style: preserve-3d; border: none; box-shadow: 0 8px 0 #1E3A8A; color: transparent; }
        .memory-card.flipped { background: white; border: 4px solid var(--primary); color: initial; box-shadow: 0 4px 0 #94A3B8; transform: translateY(4px); pointer-events: none; }
        .memory-card.matched { background: #D1FAE5; border-color: #10B981; color: initial; opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body>

    <div id="alarm-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(239, 68, 68, 0.9); z-index: 99999; flex-direction:column; justify-content:center; align-items:center; color:white; text-align:center; padding: 20px;">
        <i class="fa-solid fa-bullhorn fa-beat" style="font-size: 100px; margin-bottom: 30px;"></i>
        <h1 style="font-size: 40px; font-weight: 900; margin-bottom: 20px;">ประกาศจากลูกหลาน!</h1>
        <p id="alarm-text" style="font-size: 28px; font-weight: 700; margin-bottom: 40px;"></p>
        <button onclick="closeAlarm()" style="background:white; color:#EF4444; border:none; padding: 20px 40px; border-radius: 20px; font-size: 24px; font-weight: 900; box-shadow: 0 6px 0 #FCA5A5;">รับทราบครับ</button>
    </div>

    <div id="video-modal">
        <div class="video-header">
            <span style="color: white; font-size: 24px; font-weight: 900;"><i class="fa-solid fa-video" style="color: #38BDF8;"></i> กำลังคุยกับลูกหลาน</span>
            <button onclick="endVideoCall()" style="background: #EF4444; color: white; border: none; padding: 15px 30px; border-radius: 16px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #991B1B;"><i class="fa-solid fa-phone-slash"></i> วางสาย</button>
        </div>
        <div id="jitsi-container"></div>
    </div>

    <div id="game-modal">
        <div class="video-header" style="background: #BE185D;">
            <span style="color: white; font-size: 24px; font-weight: 900;"><i class="fa-solid fa-brain"></i> เกมจับคู่ฝึกสมอง</span>
            <button onclick="closeGame()" style="background: white; color: #BE185D; border: none; padding: 15px 30px; border-radius: 16px; font-size: 22px; font-weight: 900; cursor: pointer;"><i class="fa-solid fa-xmark"></i> เลิกเล่น</button>
        </div>
        <div id="game-board"></div>
    </div>

    <div class="header">
        <div class="greeting">
            <h1>สวัสดีครับ คุณตา</h1>
            <p><i class="fa-solid fa-satellite-dish fa-beat"></i> ระบบเชื่อมต่อลูกหลานทำงานปกติ</p>
        </div>
        <div class="clock-box">
            <div class="time-text" id="clock-time">00:00</div>
            <div class="date-text" id="clock-date">กำลังโหลด...</div>
        </div>
    </div>

    <div class="bento-grid">
        <div class="card card-wide">
            <div class="card-header"><i class="fa-solid fa-clipboard-question" style="color:#D97706"></i> วันนี้คุณตารู้สึกอย่างไรบ้างครับ?</div>
            <div class="mood-grid">
                <button class="mood-btn" onclick="sendMood(this, '😁 สบายดี')">
                    <span class="mood-emoji">😁</span><span class="mood-text">สบายดีมาก</span>
                </button>
                <button class="mood-btn" onclick="sendMood(this, '🤒 ปวดเมื่อย/ไม่สบาย')">
                    <span class="mood-emoji">🤒</span><span class="mood-text">ปวดเมื่อย</span>
                </button>
                <button class="mood-btn" onclick="sendMood(this, '😢 เหงา/อยากคุยด้วย')">
                    <span class="mood-emoji">😢</span><span class="mood-text">เหงาจัง</span>
                </button>
            </div>
        </div>

        <div class="card card-wide">
            <div class="card-header"><i class="fa-solid fa-pills" style="color:#EA580C"></i> ตารางกินยาของคุณตา</div>
            <div class="pill-item">
                <div class="pill-img"></div>
                <div class="pill-info">
                    <div class="pill-title" id="pill-desc">กำลังโหลดข้อมูล...</div>
                </div>
                <button class="btn-pill" id="btn-pill" onclick="markPillDone()"><i class="fa-solid fa-check"></i> กินแล้ว</button>
            </div>
        </div>

        <div class="card card-wide">
            <div class="card-header"><i class="fa-solid fa-images" style="color:#059669"></i> รูปล่าสุดจากลูกหลาน</div>
            <div class="gallery-container" id="gallery"></div>
        </div>

        <div class="card card-wide">
            <button class="btn-game" onclick="openGame()">
                <i class="fa-solid fa-gamepad fa-bounce"></i> เล่นเกมจับคู่ ฝึกสมอง!
            </button>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-call-main" onclick="startVideoCall('คุณตา (VIP)')">
            <i class="fa-solid fa-video fa-beat"></i> กดปุ่มนี้เพื่อคุยกับหลาน
        </button>
        <button class="btn-sos-main" id="btn-sos" onclick="executeSOS()">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 32px;"></i> ฉุกเฉิน
        </button>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycby8enGt2JJA8RwqoyX4xcQXGjpDBVpGly5QKxM_WrR5hMJqEW2gJu_rCL6063BNXPY/exec";
        let isProcessingSOS = false; let voiceEnabled = false;
        let latestTimestamp = ""; // ตัวแปรเช็คอัปเดตใหม่
        
        // นาฬิกา
        setInterval(() => {
            let d = new Date();
            document.getElementById('clock-time').innerText = d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('clock-date').innerText = d.toLocaleDateString('th-TH', {weekday: 'long', day: 'numeric', month: 'long'});
        }, 1000);

        function speakThai(text) {
            if ('speechSynthesis' in window && voiceEnabled) {
                window.speechSynthesis.cancel(); 
                let msg = new SpeechSynthesisUtterance(text); msg.lang = 'th-TH'; msg.rate = 0.9; msg.volume = 1;
                window.speechSynthesis.speak(msg);
            }
        }

        document.body.addEventListener('click', () => { voiceEnabled = true; }, {once: true});

        // ------------------ ระบบ Video Call ------------------
        let api = null;
        function startVideoCall(userName) {
            speakThai("กำลังเปิดกล้อง เพื่อคุยกับลูกหลานครับ");
            document.getElementById('video-modal').style.display = 'flex';
            const domain = 'meet.jit.si';
            const options = {
                roomName: 'FamilyCare_PrivateRoom_EXTREME99', width: '100%', height: '100%',
                parentNode: document.querySelector('#jitsi-container'), userInfo: { displayName: userName },
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera'], SHOW_JITSI_WATERMARK: false }
            };
            api = new JitsiMeetExternalAPI(domain, options);
            api.addListener('videoConferenceLeft', () => { endVideoCall(); });
        }

        function endVideoCall() {
            if(api) { api.dispose(); api = null; }
            document.getElementById('video-modal').style.display = 'none';
            speakThai("วางสายเรียบร้อยแล้วครับ");
        }

        // ------------------ เกมจับคู่ ฝึกสมอง ------------------
        let gameCards = ['🍎','🍎','🍌','🍌','🍇','🍇','🍉','🍉', '🐶','🐶','🐱','🐱'];
        let firstCard = null, secondCard = null, matchedPairs = 0, lockBoard = false;

        function openGame() {
            speakThai("มาเล่นเกมฝึกสมองกันครับ หาภาพที่เหมือนกันให้เจอนะครับ");
            document.getElementById('game-modal').style.display = 'flex';
            initGame();
        }
        function closeGame() { document.getElementById('game-modal').style.display = 'none'; }
        
        function initGame() {
            const board = document.getElementById('game-board'); board.innerHTML = '';
            gameCards.sort(() => 0.5 - Math.random()); // สลับไพ่
            matchedPairs = 0; firstCard = null; secondCard = null; lockBoard = false;
            
            gameCards.forEach((emoji, index) => {
                let card = document.createElement('button');
                card.classList.add('memory-card');
                card.dataset.emoji = emoji;
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (lockBoard || card === firstCard || card.classList.contains('matched')) return;
            card.classList.add('flipped'); card.innerText = card.dataset.emoji;

            if (!firstCard) { firstCard = card; return; }
            secondCard = card; lockBoard = true;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;
            if (isMatch) {
                firstCard.classList.add('matched'); secondCard.classList.add('matched');
                speakThai("เก่งมากครับ");
                matchedPairs++;
                if(matchedPairs === gameCards.length / 2) {
                    setTimeout(() => { speakThai("ยอดเยี่ยมมากครับ คุณตาชนะแล้ว"); alert("🎉 ชนะแล้ว! เก่งมากๆ ครับ!"); initGame(); }, 500);
                }
                resetBoard();
            } else {
                setTimeout(() => {
                    firstCard.classList.remove('flipped'); firstCard.innerText = '';
                    secondCard.classList.remove('flipped'); secondCard.innerText = '';
                    resetBoard();
                }, 1000);
            }
        }
        function resetBoard() { [firstCard, secondCard, lockBoard] = [null, null, false]; }


        // ------------------ ระบบรับข้อมูลและเสียงเตือน ------------------
        function sendMood(btnElement, moodText) {
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            speakThai("บอกลูกหลานให้แล้วครับ ว่า" + moodText);
            sendToBackend({ action: "mood", detail: moodText });
        }

        async function fetchAdminUpdates() {
            try {
                const response = await fetch(scriptUrl); const result = await response.json();
                if (result.status === "success" && result.data.length > 0) {
                    const rows = result.data.reverse(); 
                    
                    // เช็คแจ้งเตือนเสียงแบบ Real-time
                    let newestEventTime = rows[0][0]; // timestamp ของช่องแรกสุด
                    if (latestTimestamp !== "" && newestEventTime !== latestTimestamp) {
                        let newAction = rows[0][1]; let newDetail = rows[0][2];
                        if (newAction === "alarm") {
                            triggerVoiceAlarm(newDetail);
                        }
                    }
                    latestTimestamp = newestEventTime;

                    let foundPill = false, foundPhoto = false;
                    for (let row of rows) {
                        let action = row[1], detail = row[2];
                        if (action === "save_pill" && !foundPill) { document.getElementById('pill-desc').innerText = detail.replace("ตารางยา: ", ""); foundPill = true; }
                        if (action === "save_photo" && !foundPhoto) { document.getElementById('gallery').style.backgroundImage = `url('${detail.replace("อัปเดตแกลเลอรี่: ", "")}')`; foundPhoto = true; }
                    }
                    if(!foundPill) document.getElementById('pill-desc').innerText = "ยังไม่มีตารางยา";
                }
            } catch (e) {}
        }

        window.onload = () => { fetchAdminUpdates(); setInterval(fetchAdminUpdates, 5000); /* โหลดถี่ขึ้นเพื่อจับเสียงเตือนไวขึ้น */ };

        function triggerVoiceAlarm(message) {
            // เล่นเสียงและโชว์หน้าจอแดง
            document.getElementById('alarm-text').innerText = message;
            document.getElementById('alarm-overlay').style.display = 'flex';
            speakThai(message);
        }

        function closeAlarm() {
            document.getElementById('alarm-overlay').style.display = 'none';
        }

        function sendToBackend(actionData) {
            fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(actionData), headers: { "Content-Type": "text/plain;charset=utf-8" }});
        }

        function executeSOS() {
            if(isProcessingSOS) return;
            isProcessingSOS = true; let btn = document.getElementById('btn-sos');
            btn.style.opacity = '0.7'; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            speakThai("กำลังส่งตำแหน่ง ไปหาลูกหลานครับ");

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    sendToBackend({ action: "sos", lat: pos.coords.latitude, lng: pos.coords.longitude });
                    btn.innerHTML = '<i class="fa-solid fa-check"></i>'; setTimeout(() => { resetSOS(btn); }, 15000);
                }, (err) => {
                    sendToBackend({ action: "sos", lat: 0, lng: 0 }); resetSOS(btn);
                }, { enableHighAccuracy: true, timeout: 10000 });
            }
        }

        function resetSOS(btn) { isProcessingSOS = false; btn.style.opacity = '1'; btn.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="font-size: 32px;"></i> ฉุกเฉิน'; }

        function markPillDone() {
            let btn = document.getElementById('btn-pill');
            btn.innerHTML = "<i class='fa-solid fa-check-double'></i> กินแล้ว"; btn.style.background = "#94A3B8"; btn.style.boxShadow = "none"; btn.disabled = true;
            speakThai("เก่งมากครับ ระบบบันทึกให้แล้วครับ");
            sendToBackend({ action: "pill" });
        }
    </script>
</body>
</html>
