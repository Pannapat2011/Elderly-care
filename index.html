<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผงควบคุมหลัก (FamilyCare)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --primary: #3B82F6; --success: #10B981; --text: #F8FAFC; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }

        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        .card { background: var(--card); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .card-title { font-size: 24px; font-weight: 700; margin-bottom: 25px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: center; justify-content: space-between;}

        /* สถานะ */
        .status-badge { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 30px; font-weight: bold; }
        .online { color: var(--success); }
        .offline { color: #EF4444; }

        .stat-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 20px;}
        .stat-value { font-size: 28px; font-weight: bold; color: var(--primary); }

        /* ฟอร์มและปุ่ม */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94A3B8; font-size: 16px;}
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #475569; background: #0F172A; color: white; font-size: 18px; outline: none; transition: 0.2s;}
        input[type="text"]:focus { border-color: var(--primary); }

        .btn { padding: 15px 25px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; display: inline-flex; align-items: center; gap: 10px;}
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px);}
        .btn-send { background: var(--primary); margin-top: 10px; width: 100%; justify-content: center;}
        .btn-video { background: #8B5CF6; width: 100%; justify-content: center; margin-bottom: 10px;}
        .btn-danger { background: #EF4444; width: 100%; justify-content: center;}

        #video-modal { display: none; position: fixed; inset: 0; background: black; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

    <div id="video-modal">
        <div style="padding: 20px; background: #111; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="color: white;"><i class="fa-solid fa-video"></i> กำลังสนทนากับคุณตา</h2>
            <button class="btn btn-danger" style="width: auto;" onclick="stopVideoCall()">วางสาย (ตัดกล้องคุณตา)</button>
        </div>
        <div id="jitsi-container" style="flex: 1;"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">
                <span><i class="fa-solid fa-desktop"></i> สถานะหน้าจอคุณตา</span>
                <span class="status-badge offline" id="online-status">ออฟไลน์ 🔴</span>
            </div>
            
            <div class="stat-box">
                <span><i class="fa-solid fa-glass-water"></i> ปริมาณการดื่มน้ำ</span>
                <span class="stat-value" id="stat-water">0 แก้ว</span>
            </div>
            <div class="stat-box">
                <span><i class="fa-solid fa-check-double"></i> สถานะการกินยา</span>
                <span class="stat-value" id="stat-pill" style="color:#F59E0B">ยังไม่กิน</span>
            </div>

            <div style="margin-top: 40px;">
                <h3 style="margin-bottom: 15px; color: #EF4444;"><i class="fa-solid fa-video"></i> วีดีโอคอลฉุกเฉิน</h3>
                <button class="btn btn-video" onclick="startVideoCall()">บังคับเปิดกล้องคุณตา</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span><i class="fa-solid fa-paper-plane"></i> ส่งข้อมูลไปหน้าจอคุณตา</span></div>

            <div class="form-group">
                <label>1. ข้อความประกาศ (ส่งเสียงพูดไปที่จอ)</label>
                <input type="text" id="input-alert" placeholder="พิมพ์ข้อความ เช่น ได้เวลาทานข้าวแล้ว...">
                <button class="btn btn-send" onclick="sendData('alert')"><i class="fa-solid fa-bullhorn"></i> ประกาศเสียง</button>
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 30px 0;">

            <div class="form-group">
                <label>2. อัปเดตตารางยา</label>
                <input type="text" id="input-pill" placeholder="เช่น ยาความดัน 1 เม็ด (หลังอาหารเช้า)">
                <button class="btn btn-send" style="background: #10B981;" onclick="sendData('pill')"><i class="fa-solid fa-pills"></i> อัปเดตยา</button>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label>3. อัปเดตวันนัดหมอ</label>
                <input type="text" id="input-appoint" placeholder="เช่น รพ.ชลบุรี (พุธ 15 พ.ค. เวลา 10:00น.)">
                <button class="btn btn-send" style="background: #F59E0B;" onclick="sendData('appoint')"><i class="fa-regular fa-calendar-check"></i> อัปเดตนัดหมอ</button>
            </div>
        </div>
    </div>

    <script>
        // ต้องตรงกับ SYSTEM_ID ของคนแก่
        const SYSTEM_ID = "FAMILY_001"; 
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let onlineTimer;
        let jitsiApi = null;

        client.on('connect', () => {
            // ดักฟังสถานะจากคนแก่
            client.subscribe(`familycare/${SYSTEM_ID}/status/#`);
        });

        client.on('message', (topic, message) => {
            const payload = message.toString();
            const type = topic.split('/').pop();

            if(type === 'heartbeat') {
                const badge = document.getElementById('online-status');
                badge.innerText = "ออนไลน์ 🟢";
                badge.className = "status-badge online";
                
                clearTimeout(onlineTimer);
                onlineTimer = setTimeout(() => {
                    badge.innerText = "ออฟไลน์ 🔴";
                    badge.className = "status-badge offline";
                }, 7000);
            }
            else if(type === 'water') {
                document.getElementById('stat-water').innerText = payload + " แก้ว";
            }
            else if(type === 'pill_taken') {
                document.getElementById('stat-pill').innerText = "กินเรียบร้อย ✔️";
                document.getElementById('stat-pill').style.color = "#10B981";
            }
            else if(type === 'sos') {
                alert("🚨 สัญญาณ SOS จากคุณตา!!");
            }
        });

        // ฟังก์ชันหัวใจหลัก: ยิง MQTT ข้อมูลไปหาคนแก่โดยตรง
        function sendData(type) {
            const inputEl = document.getElementById(`input-${type}`);
            const val = inputEl.value;
            if(!val) return alert("กรุณาพิมพ์ข้อมูลก่อนส่ง");

            // ยิงไปที่ Topic /command/xxx ของเครื่องคนแก่
            client.publish(`familycare/${SYSTEM_ID}/command/${type}`, val);
            
            inputEl.value = ""; // ล้างช่อง
            alert("ส่งข้อมูลเข้าหน้าจอคุณตาสำเร็จ!");
        }

        // วีดีโอคอล
        function startVideoCall() {
            client.publish(`familycare/${SYSTEM_ID}/command/video`, "start");
            document.getElementById('video-modal').style.display = 'flex';
            jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: "Room_" + SYSTEM_ID,
                parentNode: document.getElementById('jitsi-container'),
                width: "100%", height: "100%"
            });
        }

        function stopVideoCall() {
            client.publish(`familycare/${SYSTEM_ID}/command/video`, "stop");
            if(jitsiApi) jitsiApi.dispose();
            document.getElementById('video-modal').style.display = 'none';
        }
    </script>
</body>
</html>
