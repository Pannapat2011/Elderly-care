<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>หน้าจอคุณตา (Ultimate Clean)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        /* ตัวแปรสี Day/Night Mode */
        :root { --bg: #F8FAFC; --primary: #2563EB; --danger: #DC2626; --text: #0F172A; --card-bg: #FFFFFF; --info-bg: #FEF3C7; --info-border: #F59E0B; }
        body.night-mode { --bg: #0B0F1A; --primary: #3B82F6; --danger: #991B1B; --text: #F8FAFC; --card-bg: #161C2D; --info-bg: #2D3748; --info-border: #4A5568; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; user-select: none; }
        body { background: var(--bg); color: var(--text); padding: 20px; padding-bottom: 150px; transition: background 1s, color 1s; }

        /* UI หลัก */
        .header { text-align: center; margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.5s; }
        .clock { font-size: 80px; font-weight: 900; color: var(--primary); line-height: 1; }
        
        .info-box { background: var(--info-bg); border: 5px solid var(--info-border); padding: 25px; border-radius: 30px; margin-bottom: 25px; transition: 0.5s; }
        .info-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; color: var(--text); }
        .info-text { font-size: 36px; font-weight: 900; color: var(--text); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-big { font-size: 32px; font-weight: 900; padding: 40px 20px; border-radius: 30px; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .btn-big:active { transform: translateY(10px); }
        .btn-water { background: #0EA5E9; box-shadow: 0 12px 0 #0284C7; }
        .btn-pill { background: #10B981; box-shadow: 0 12px 0 #059669; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: var(--card-bg); border-top: 5px solid var(--info-border); z-index: 100; transition: 0.5s; }
        .btn-sos { width: 100%; font-size: 45px; font-weight: 900; padding: 30px; border-radius: 40px; border: none; background: var(--danger); color: white; box-shadow: 0 15px 0 rgba(0,0,0,0.5); }

        /* ระบบสไลด์โชว์รูปลูกหลาน */
        #screensaver { display: none; position: fixed; inset: 0; z-index: 900; background-color: black; background-size: contain; background-repeat: no-repeat; background-position: center; animation: fade 2s; }
        
        /* Overlays */
        .overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        .alert-box { background: #F59E0B; padding: 50px; border-radius: 40px; width: 100%; max-width: 600px; color: black; }
        
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="screensaver"></div>

    <div id="alert-overlay" class="overlay">
        <div class="alert-box">
            <i class="fa-solid fa-bullhorn fa-beat" style="font-size: 100px;"></i>
            <div style="font-size: 50px; font-weight: 900; margin: 30px 0; line-height: 1.2;" id="alert-msg">ข้อความ...</div>
            <button onclick="document.getElementById('alert-overlay').style.display='none'" style="font-size: 40px; padding: 20px 60px; border-radius: 30px; border: none; font-weight: 900; background: white; color: black;">รับทราบ</button>
        </div>
    </div>

    <div id="video-overlay" class="overlay" style="padding:0; background: black;">
        <div id="jitsi-container" style="width: 100%; height: 100%;"></div>
    </div>

    <div class="header">
        <div class="clock" id="clock">00:00</div>
        <div style="font-size: 24px; font-weight: 600; opacity: 0.5;">แตะหน้าจอ 1 ครั้งเพื่อเปิดระบบเสียง</div>
    </div>

    <div class="info-box">
        <div class="info-title"><i class="fa-solid fa-pills"></i> ยาที่ต้องกินวันนี้</div>
        <div class="info-text" id="disp-pill">ยังไม่มีข้อมูลยา</div>
    </div>

    <div class="info-box" style="border-color: #6366F1;">
        <div class="info-title"><i class="fa-regular fa-calendar-check"></i> นัดหมอครั้งถัดไป</div>
        <div class="info-text" id="disp-appoint">ยังไม่มีวันนัด</div>
    </div>

    <div class="grid">
        <button class="btn-big btn-water" onclick="drinkWater()"><i class="fa-solid fa-glass-water" style="font-size: 60px;"></i><span>ดื่มน้ำ <br><small id="water-count" style="font-size:24px;">(0 แก้ว)</small></span></button>
        <button class="btn-big btn-pill" onclick="takePill()"><i class="fa-solid fa-check-double" style="font-size: 60px;"></i><span>กินยาแล้ว</span></button>
    </div>

    <div class="bottom-bar">
        <button class="btn-sos" onclick="triggerSOS()"><i class="fa-solid fa-triangle-exclamation"></i> แจ้งเหตุฉุกเฉินด่วน!</button>
    </div>

    <script>
        // รหัสเครื่อง (ต้องตรงกับฝั่งลูกหลาน)
        const SYSTEM_ID = "FAMILY_001_VIP"; 
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        
        let waterCount = 0;
        let jitsiApi = null;
        let idleSeconds = 0;
        
        // รูปภาพเริ่มต้นสำหรับสไลด์โชว์
        let photos = ["https://images.unsplash.com/photo-1511895426328-dc8714191300?w=800&q=80"];
        let photoIndex = 0;

        // ระบบเวลา, Night Mode และ Screensaver
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            
            // Auto Night Mode (เปิดตอน 19:00 ถึง 06:00)
            const hour = now.getHours();
            if(hour >= 19 || hour < 6) document.body.classList.add('night-mode');
            else document.body.classList.remove('night-mode');

            // จับเวลาไม่ใช้งาน (ถ้าเกิน 30 วิ โชว์รูป)
            idleSeconds++;
            if(idleSeconds > 30) {
                const ss = document.getElementById('screensaver');
                if(ss.style.display !== 'block') {
                    ss.style.display = 'block';
                    changePhoto();
                }
            }
        }, 1000);

        setInterval(changePhoto, 10000); // เปลี่ยนรูปทุก 10 วิ

        function changePhoto() {
            if(photos.length === 0) return;
            document.getElementById('screensaver').style.backgroundImage = `url('${photos[photoIndex]}')`;
            photoIndex = (photoIndex + 1) % photos.length;
        }

        // แตะหน้าจอเพื่อรีเซ็ตเวลาและเปิดเสียง
        document.body.addEventListener('click', () => { 
            idleSeconds = 0; 
            document.getElementById('screensaver').style.display = 'none';
            if(window.speechSynthesis) window.speechSynthesis.getVoices(); 
        });

        function speak(txt) {
            if('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(txt);
                msg.lang = 'th-TH'; window.speechSynthesis.speak(msg);
            }
        }

        // --- ระบบรับคำสั่ง MQTT ---
        client.on('connect', () => {
            client.subscribe(`familycare/${SYSTEM_ID}/command/#`);
            // ส่งสัญญาณชีพจรบอกลูกหลานว่าเครื่องเปิดอยู่
            setInterval(() => client.publish(`familycare/${SYSTEM_ID}/status/heartbeat`, 'online'), 5000);
        });

        client.on('message', (topic, message) => {
            const payload = message.toString();
            const action = topic.split('/').pop();
            
            idleSeconds = 0; // มีข้อความเข้า รีเซ็ตหน้าจอสไลด์โชว์

            if(action === 'pill') { document.getElementById('disp-pill').innerText = payload; speak("มียาอัปเดตใหม่ครับ"); }
            else if(action === 'appoint') { document.getElementById('disp-appoint').innerText = payload; speak("มีนัดหมายอัปเดตครับ"); }
            else if(action === 'photo') { photos.push(payload); speak("มีรูปหลานๆ ส่งมาใหม่ครับ"); }
            else if(action === 'alert') {
                document.getElementById('alert-msg').innerText = payload;
                document.getElementById('alert-overlay').style.display = 'flex';
                speak("ลูกหลานแจ้งว่า: " + payload);
            }
            else if(action === 'video') {
                if(payload === 'start') {
                    document.getElementById('video-overlay').style.display = 'flex';
                    speak("กำลังเชื่อมต่อกล้องกับลูกหลาน");
                    jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Room_" + SYSTEM_ID, parentNode: document.getElementById('jitsi-container'), width: "100%", height: "100%" });
                } else {
                    if(jitsiApi) jitsiApi.dispose();
                    document.getElementById('video-overlay').style.display = 'none';
                }
            }
        });

        // --- ระบบส่งข้อมูลกลับ ---
        function drinkWater() {
            waterCount++; document.getElementById('water-count').innerText = `(${waterCount} แก้ว)`;
            speak("ดื่มน้ำเก่งมากครับ"); 
            client.publish(`familycare/${SYSTEM_ID}/status/water`, waterCount.toString());
        }

        function takePill() {
            speak("บันทึกการกินยาแล้วครับ"); 
            client.publish(`familycare/${SYSTEM_ID}/status/pill_taken`, 'yes');
        }

        function triggerSOS() {
            speak("ส่งสัญญาณเตือนภัยแล้ว กรุณารอสักครู่");
            client.publish(`familycare/${SYSTEM_ID}/status/sos`, 'EMERGENCY');
            alert("🚨 ส่งสัญญาณเตือนไปที่หน้าจอแอดมินของลูกหลานแล้ว!");
        }
    </script>
</body>
</html>
