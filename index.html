<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>หน้าจอคุณตา (Ultimate PRO)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --sub: #94A3B8; --primary: #38BDF8; --success: #10B981; --warning: #FBBF24; --danger: #EF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; user-select: none; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .dashboard { flex: 1; padding: 25px; display: flex; flex-direction: column; gap: 15px; max-width: 1000px; margin: 0 auto; width: 100%; }

        .header { text-align: center; margin-bottom: 5px; }
        .clock { font-size: 90px; font-weight: 800; color: var(--primary); line-height: 1; }
        .date-text { font-size: 28px; color: var(--warning); font-weight: 600; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 2px solid rgba(255,255,255,0.05); }
        .card-header { font-size: 22px; color: var(--sub); font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .pill-list { display: flex; flex-direction: column; gap: 10px; max-height: 180px; overflow-y: auto; }
        .pill-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 12px 18px; border-radius: 12px; }
        .pill-name { font-size: 24px; font-weight: 800; }
        .btn-take { background: var(--success); color: white; border: none; padding: 12px 25px; font-size: 20px; font-weight: 800; border-radius: 12px; cursor: pointer; box-shadow: 0 6px 0 #059669; }
        .btn-take.taken { background: #475569; box-shadow: none; color: #94A3B8; pointer-events: none; }

        .appoint-box { background: rgba(56, 189, 248, 0.1); border: 2px solid var(--primary); padding: 15px; border-radius: 15px; }
        .appoint-val { font-size: 24px; font-weight: 800; color: white; line-height: 1.4; }

        .action-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: auto; }
        .btn-action { background: var(--card); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; cursor: pointer; color: white; border: 2px solid rgba(255,255,255,0.05); }
        .btn-grab { background: #00B14F; border: none; } /* สี Grab */
        .btn-sos { background: linear-gradient(135deg, #EF4444, #B91C1C); border: none; grid-column: span 1; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: var(--card); padding: 40px; border-radius: 30px; text-align: center; width: 90%; border: 4px solid var(--warning); }
        #screensaver { display: none; position: fixed; inset: 0; z-index: 900; background-color: black; background-size: contain; background-repeat: no-repeat; background-position: center; }
    </style>
</head>
<body>
    <div id="screensaver"></div>
    <div id="alert-overlay" class="overlay">
        <div class="modal">
            <i class="fa-solid fa-bell fa-shake" style="font-size: 80px; color: var(--warning);"></i>
            <div style="font-size: 40px; font-weight: 800; margin: 25px 0;" id="alert-msg">ข้อความใหม่</div>
            <button onclick="document.getElementById('alert-overlay').style.display='none'" style="padding: 20px 50px; font-size: 28px; font-weight: 800; border-radius: 15px; background: var(--warning); border:none;">รับทราบ</button>
        </div>
    </div>
    <div id="video-overlay" class="overlay"><div id="jitsi-container" style="width:100%; height:100%;"></div></div>

    <div class="dashboard">
        <div class="header">
            <div class="clock" id="clock">00:00</div>
            <div class="date-text" id="date-display">กำลังโหลดวันที่...</div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fa-solid fa-pills" style="color:var(--warning);"></i> ยาที่ต้องทาน</div>
            <div class="pill-list" id="pill-container"></div>
        </div>

        <div class="card appoint-box">
            <div class="card-header"><i class="fa-solid fa-calendar-day" style="color:var(--primary);"></i> นัดหมายครั้งถัดไป</div>
            <div class="appoint-val" id="disp-appoint">ไม่มีนัดหมาย</div>
        </div>

        <div class="action-bar">
            <div class="btn-action" onclick="drinkWater()"><i class="fa-solid fa-glass-water" style="color:#38BDF8; font-size:40px;"></i><span>น้ำ (0)</span></div>
            <div class="btn-action btn-grab" onclick="orderFood()"><i class="fa-solid fa-utensils" style="color:white; font-size:40px;"></i><span>สั่งอาหาร</span></div>
            <div class="btn-action btn-sos" onclick="triggerSOS()"><i class="fa-solid fa-triangle-exclamation" style="font-size:40px;"></i><span>แจ้งเหตุ SOS</span></div>
        </div>
    </div>

    <script>
        const SYSTEM_ID = "FAMILY_001_VIP"; 
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let waterCount = 0, pills = [], idleSeconds = 0;

        window.onload = () => {
            waterCount = parseInt(localStorage.getItem('waterCount') || 0);
            document.getElementById('water-count').innerText = `น้ำ (${waterCount})`;
            pills = JSON.parse(localStorage.getItem('pillsList') || '[]');
            renderPills();
            document.getElementById('disp-appoint').innerText = localStorage.getItem('appoint') || 'ไม่มีนัดหมาย';
        };

        function updateDateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-display').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long' });
            if(++idleSeconds > 60) document.getElementById('screensaver').style.display = 'block';
        }
        setInterval(updateDateTime, 1000);

        function speak(txt) {
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'th-TH'; window.speechSynthesis.speak(msg);
        }

        function renderPills() {
            const container = document.getElementById('pill-container');
            container.innerHTML = pills.length ? pills.map((p, i) => `
                <div class="pill-item">
                    <span class="pill-name" style="color:${p.taken ? '#94A3B8' : 'white'}">${p.name}</span>
                    <button class="btn-take ${p.taken ? 'taken' : ''}" onclick="takePill(${i})">${p.taken ? 'กินแล้ว' : 'กินยา'}</button>
                </div>`).join('') : '<div style="color:var(--sub); font-size:20px; text-align:center;">ยังไม่มียา</div>';
        }

        function takePill(i) {
            pills[i].taken = true; localStorage.setItem('pillsList', JSON.stringify(pills));
            renderPills(); speak(`กิน ${pills[i].name} แล้วครับ`);
            client.publish(`familycare/${SYSTEM_ID}/status/pill_taken`, pills[i].name);
        }

        function drinkWater() {
            waterCount++; localStorage.setItem('waterCount', waterCount);
            document.getElementById('water-count').innerText = `น้ำ (${waterCount})`;
            speak("ดื่มน้ำแล้วครับ"); client.publish(`familycare/${SYSTEM_ID}/status/water`, waterCount.toString());
        }

        function orderFood() {
            speak("เปิดเมนูสั่งอาหาร Grab ครับ");
            client.publish(`familycare/${SYSTEM_ID}/status/food_request`, "คุณตากำลังดูเมนู Grab");
            window.open("https://food.grab.com/th/th/", "_blank");
        }

        client.on('connect', () => {
            client.subscribe(`familycare/${SYSTEM_ID}/command/#`);
            setInterval(() => client.publish(`familycare/${SYSTEM_ID}/status/heartbeat`, 'online'), 5000);
        });

        client.on('message', (topic, message) => {
            const payload = message.toString();
            const action = topic.split('/').pop();
            if(action === 'pills_update') { pills = JSON.parse(payload); localStorage.setItem('pillsList', payload); renderPills(); speak("มีรายการยาใหม่ครับ"); }
            else if(action === 'appoint') { document.getElementById('disp-appoint').innerText = payload; localStorage.setItem('appoint', payload); speak("มีนัดหมายใหม่ครับ"); }
            else if(action === 'alert') { document.getElementById('alert-msg').innerText = payload; document.getElementById('alert-overlay').style.display = 'flex'; speak(payload); }
            else if(action === 'video') {
                if(payload === 'start') {
                    document.getElementById('video-overlay').style.display = 'flex';
                    jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Room_" + SYSTEM_ID, parentNode: document.getElementById('jitsi-container'), width: "100%", height: "100%" });
                } else { if(jitsiApi) jitsiApi.dispose(); document.getElementById('video-overlay').style.display = 'none'; }
            }
        });

        function triggerSOS() {
            speak("กำลังส่งสัญญาณ SOS และพิกัดของคุณครับ");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const data = { lat: pos.coords.latitude, lng: pos.coords.longitude, time: new Date().toLocaleTimeString() };
                    client.publish(`familycare/${SYSTEM_ID}/status/sos`, JSON.stringify(data));
                }, () => { client.publish(`familycare/${SYSTEM_ID}/status/sos`, JSON.stringify({error: "GPS_DENIED"})); });
            }
            alert("ส่งสัญญาณฉุกเฉินและพิกัดแล้ว!");
        }
        document.body.onclick = () => { idleSeconds = 0; document.getElementById('screensaver').style.display = 'none'; };
    </script>
</body>
</html>
