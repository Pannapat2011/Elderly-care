<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>หน้าจอคุณตา (The Ultimate Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --sub: #94A3B8; --primary: #38BDF8; --success: #10B981; --warning: #FBBF24; --danger: #EF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; user-select: none; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .dashboard { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }

        .header { text-align: center; margin-bottom: 10px; }
        .clock { font-size: 100px; font-weight: 800; color: var(--primary); line-height: 1; text-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }
        .date-text { font-size: 28px; color: var(--warning); margin-top: 5px; font-weight: 600; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 2px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;}
        .card-header { font-size: 22px; color: var(--sub); font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .pill-list { display: flex; flex-direction: column; gap: 12px; max-height: 220px; overflow-y: auto; }
        .pill-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 12px 18px; border-radius: 12px; border-left: 5px solid var(--warning); }
        .pill-name { font-size: 24px; font-weight: 800; color: white; }
        .btn-take-pill { background: var(--success); color: white; border: none; padding: 12px 25px; font-size: 20px; font-weight: 800; border-radius: 12px; cursor: pointer; box-shadow: 0 6px 0 #059669; transition: 0.2s; }
        .btn-take-pill:active { transform: translateY(6px); box-shadow: none; }
        .btn-take-pill.taken { background: #475569; box-shadow: none; color: #94A3B8; pointer-events: none; border-left-color: #475569;}

        .appoint-val { font-size: 26px; font-weight: 800; color: white; line-height: 1.4; padding: 15px; background: rgba(56,189,248,0.1); border-radius: 15px; border: 2px solid var(--primary); flex: 1;}

        .action-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: auto; }
        .btn-action { background: var(--card); border: 2px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 25px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; font-size: 22px; font-weight: 800; cursor: pointer; color: white; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); background: rgba(0,0,0,0.5); }
        .btn-grab { background: #00B14F; border: none; }
        .btn-sos { background: linear-gradient(135deg, #EF4444, #B91C1C); border: none; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: var(--card); padding: 50px; border-radius: 30px; text-align: center; max-width: 700px; width: 90%; border: 4px solid var(--warning); }
        .btn-ack { background: var(--warning); color: black; border: none; padding: 20px 50px; font-size: 26px; font-weight: 800; border-radius: 20px; margin-top: 20px; }
        #screensaver { display: none; position: fixed; inset: 0; z-index: 900; background-color: black; background-size: cover; background-position: center; }
    </style>
</head>
<body>

    <div id="screensaver"></div>

    <div id="alert-overlay" class="overlay">
        <div class="modal">
            <i class="fa-solid fa-bell fa-shake" style="font-size: 90px; color: var(--warning);"></i>
            <div style="font-size: 40px; font-weight: 800; margin: 30px 0; line-height: 1.3;" id="alert-msg">ข้อความใหม่</div>
            <button class="btn-ack" onclick="acknowledgeAlert()">รับทราบครับ</button>
        </div>
    </div>

    <div id="video-overlay" class="overlay"><div id="jitsi-container" style="width:100%; height:100%;"></div></div>

    <div class="dashboard">
        <div class="header">
            <div class="clock" id="clock">00:00</div>
            <div class="date-text" id="date-display">กำลังโหลดวันที่...</div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header"><i class="fa-solid fa-pills" style="color:var(--warning);"></i> ยาที่ต้องทานวันนี้</div>
                <div class="pill-list" id="pill-container">
                    <div style="color:var(--sub); font-size: 20px; text-align:center; padding: 20px;">ไม่มีตารางยา</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="fa-regular fa-calendar-check" style="color:var(--primary);"></i> นัดหมายหมอครั้งถัดไป</div>
                <div class="appoint-val" id="disp-appoint">ไม่มีนัดหมาย</div>
            </div>
        </div>

        <div class="action-bar">
            <div class="btn-action" onclick="drinkWater()">
                <i class="fa-solid fa-glass-water" style="color: var(--primary); font-size: 45px;"></i>
                <span id="water-count">ดื่มน้ำ (0)</span>
            </div>
            <div class="btn-action btn-grab" onclick="orderFood()">
                <i class="fa-solid fa-utensils" style="font-size: 45px;"></i>
                <span>สั่งอาหาร</span>
            </div>
            <div class="btn-action" onclick="toggleMusic()">
                <i class="fa-solid fa-radio" style="color: #8B5CF6; font-size: 45px;"></i>
                <span>ฟังเพลง</span>
            </div>
            <div class="btn-action btn-sos" onclick="triggerSOS()">
                <i class="fa-solid fa-triangle-exclamation" style="font-size: 45px;"></i>
                <span>ฉุกเฉิน SOS</span>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_ID = "FAMILY_001_VIP"; 
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let waterCount = 0, jitsiApi = null, idleSeconds = 0;
        let pills = [];
        let photos = ["https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=1000&q=80"];
        let photoIndex = 0;
        let isMusicPlaying = false;
        let audio = new Audio("https://listen.radioking.com/radio/15684/stream/29964"); 

        window.onload = () => {
            if(localStorage.getItem('waterCount')) waterCount = parseInt(localStorage.getItem('waterCount'));
            document.getElementById('water-count').innerText = `ดื่มน้ำ (${waterCount})`;
            
            if(localStorage.getItem('pillsList')) {
                pills = JSON.parse(localStorage.getItem('pillsList'));
                renderPills();
            }
            if(localStorage.getItem('appoint')) document.getElementById('disp-appoint').innerText = localStorage.getItem('appoint');
            if(localStorage.getItem('photos')) photos = JSON.parse(localStorage.getItem('photos'));
        };

        function updateDateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-display').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            idleSeconds++;
            if(idleSeconds > 60) { 
                const ss = document.getElementById('screensaver');
                if(ss.style.display !== 'block') { ss.style.display = 'block'; changePhoto(); }
            }
        }
        setInterval(updateDateTime, 1000); updateDateTime();
        setInterval(changePhoto, 15000);

        function changePhoto() {
            if(photos.length === 0) return;
            document.getElementById('screensaver').style.backgroundImage = `url('${photos[photoIndex]}')`;
            photoIndex = (photoIndex + 1) % photos.length;
        }

        document.body.addEventListener('click', () => { 
            idleSeconds = 0; document.getElementById('screensaver').style.display = 'none';
            if(window.speechSynthesis) window.speechSynthesis.getVoices(); 
        });

        function speak(txt) {
            if('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(txt);
                msg.lang = 'th-TH'; window.speechSynthesis.speak(msg);
            }
        }

        function renderPills() {
            const container = document.getElementById('pill-container');
            if(pills.length === 0) {
                container.innerHTML = '<div style="color:var(--sub); font-size: 20px; text-align:center; padding: 20px;">ไม่มีตารางยา</div>';
                return;
            }
            container.innerHTML = pills.map((p, index) => `
                <div class="pill-item" style="border-left-color: ${p.taken ? '#475569' : 'var(--warning)'}">
                    <span class="pill-name" style="color: ${p.taken ? '#94A3B8' : 'white'}">${p.name}</span>
                    <button class="btn-take-pill ${p.taken ? 'taken' : ''}" onclick="takePill(${index})">
                        ${p.taken ? '<i class="fa-solid fa-check"></i> กินแล้ว' : 'กินยา'}
                    </button>
                </div>
            `).join('');
        }

        function takePill(index) {
            pills[index].taken = true;
            localStorage.setItem('pillsList', JSON.stringify(pills));
            renderPills();
            speak(`บันทึกการกิน ${pills[index].name} เรียบร้อยครับ`);
            client.publish(`familycare/${SYSTEM_ID}/status/pill_taken`, pills[index].name);
        }

        function drinkWater() {
            waterCount++; document.getElementById('water-count').innerText = `ดื่มน้ำ (${waterCount})`;
            localStorage.setItem('waterCount', waterCount); 
            speak("ดื่มน้ำเก่งมากครับ"); 
            client.publish(`familycare/${SYSTEM_ID}/status/water`, waterCount.toString());
        }

        function orderFood() {
            speak("เปิดเมนูสั่งอาหาร Grab ครับ");
            client.publish(`familycare/${SYSTEM_ID}/status/food_request`, "คุณตากำลังดูเมนูสั่งอาหาร");
            window.open("https://food.grab.com/th/th/", "_blank");
        }

        function toggleMusic() {
            if(isMusicPlaying) { audio.pause(); speak("ปิดเพลงแล้วครับ"); } 
            else { audio.play(); speak("เปิดเพลงให้ฟังครับ"); }
            isMusicPlaying = !isMusicPlaying;
        }

        client.on('connect', () => {
            client.subscribe(`familycare/${SYSTEM_ID}/command/#`);
            setInterval(() => client.publish(`familycare/${SYSTEM_ID}/status/heartbeat`, 'online'), 5000);
        });

        client.on('message', (topic, message) => {
            const payload = message.toString();
            const action = topic.split('/').pop();
            idleSeconds = 0; 

            if(action === 'pills_update') { 
                pills = JSON.parse(payload);
                localStorage.setItem('pillsList', payload); renderPills(); speak("อัปเดตตารางยาใหม่ครับ");
            }
            else if(action === 'appoint') { 
                document.getElementById('disp-appoint').innerText = payload; 
                localStorage.setItem('appoint', payload); speak("อัปเดตนัดหมายครับ"); 
            }
            else if(action === 'photo') { 
                if(!photos.includes(payload)) { photos.push(payload); localStorage.setItem('photos', JSON.stringify(photos)); speak("มีรูปหลานๆส่งมาใหม่ครับ"); }
            }
            else if(action === 'alert') {
                document.getElementById('alert-msg').innerText = payload;
                document.getElementById('alert-overlay').style.display = 'flex'; speak(payload);
            }
            else if(action === 'video') {
                if(payload === 'start') {
                    document.getElementById('video-overlay').style.display = 'flex'; speak("กำลังเปิดกล้องครับ");
                    jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "Room_" + SYSTEM_ID, parentNode: document.getElementById('jitsi-container'), width: "100%", height: "100%" });
                } else {
                    if(jitsiApi) jitsiApi.dispose(); document.getElementById('video-overlay').style.display = 'none';
                }
            }
        });

        function acknowledgeAlert() {
            document.getElementById('alert-overlay').style.display = 'none';
            client.publish(`familycare/${SYSTEM_ID}/status/read_receipt`, 'คุณตากดรับทราบข้อความแล้ว');
        }

        function triggerSOS() {
            speak("กำลังส่งสัญญาณ SOS และพิกัดของคุณครับ");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const data = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    client.publish(`familycare/${SYSTEM_ID}/status/sos`, JSON.stringify(data));
                }, () => { client.publish(`familycare/${SYSTEM_ID}/status/sos`, JSON.stringify({error: "GPS_DENIED"})); });
            } else { client.publish(`familycare/${SYSTEM_ID}/status/sos`, JSON.stringify({error: "NO_GPS"})); }
            alert("ส่งสัญญาณฉุกเฉินและพิกัดแล้ว!");
        }
    </script>
</body>
</html>
