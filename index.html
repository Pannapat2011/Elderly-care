<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elderly Care - Super App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        @font-face { font-family: 'mainfront'; src: local('mainfront'); }
        :root { --bg-color: #E2E8F0; --card-bg: #FFFFFF; --primary: #1E3A8A; --sos-color: #B91C1C; --video-color: #059669; --text-main: #020617; --text-sub: #334155; --radius-large: 28px; --radius-medium: 20px; --radius-small: 16px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'mainfront', 'Prompt', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 20px; padding-bottom: 150px; }
        
        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; background: var(--card-bg); padding: 16px; border-radius: var(--radius-large); border: 2px solid #CBD5E1; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; background-image: url('https://i.pravatar.cc/150?img=68'); background-size: cover; border: 4px solid var(--primary); }
        .greeting h1 { font-size: 28px; font-weight: 700; color: var(--primary); }
        .greeting p { font-size: 20px; color: var(--text-main); font-weight: 600; }
        
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .card { background: var(--card-bg); border-radius: var(--radius-large); padding: 20px; border: 2px solid #CBD5E1; display: flex; flex-direction: column; }
        .card-wide { grid-column: span 2; }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 22px; font-weight: 700; color: var(--text-main); border-bottom: 2px solid #E2E8F0; padding-bottom: 8px;}
        
        .status-box { background: #F0FDF4; border: 2px solid #86EFAC; padding: 12px; border-radius: var(--radius-medium); font-size: 18px; font-weight: 700; color: #166534; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;}
        .status-box.away { background: #FEF2F2; border-color: #FCA5A5; color: #991B1B; }

        .pill-item { display: flex; align-items: center; background: #FFF7ED; padding: 16px; border-radius: var(--radius-medium); border: 2px solid #FDBA74; gap: 16px; }
        .pill-img { width: 50px; height: 50px; border-radius: 12px; background: url('https://cdn-icons-png.flaticon.com/512/883/883356.png') center/cover; }
        .pill-info { display: flex; flex-direction: column; flex-grow: 1; }
        .pill-title { font-weight: 700; font-size: 20px; color: #7C2D12; }
        .btn-pill { border: none; background: #059669; color: white; padding: 12px 20px; border-radius: var(--radius-small); font-weight: 700; font-size: 18px; cursor: pointer; }

        .appointment-box { background: var(--primary); color: white; padding: 20px; border-radius: var(--radius-medium); display: flex; justify-content: space-between; align-items: center; border: 2px solid #1E40AF; }
        .btn-ride { background: #FACC15; color: #854D0E; border: none; padding: 12px 20px; border-radius: var(--radius-small); font-weight: 700; font-size: 18px; cursor: pointer; display: flex; gap: 8px; }

        .gallery-container { width: 100%; height: 180px; border-radius: var(--radius-medium); background-color: #E2E8F0; background-position: center; background-size: cover; background-image: url('https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=800&q=80'); }

        .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .mood-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #F8FAFC; border: 2px solid #CBD5E1; border-radius: var(--radius-medium); padding: 15px 5px; cursor: pointer; transition: 0.2s; }
        .mood-btn:active { transform: scale(0.95); background: #E2E8F0; }
        .mood-btn.selected { background: #FEF3C7; border-color: #F59E0B; }
        .mood-emoji { font-size: 45px; line-height: 1; margin-bottom: 8px; }
        .mood-text { font-size: 16px; font-weight: 700; color: var(--text-sub); }

        .btn-music { width: 100%; background: #8B5CF6; color: white; border: none; padding: 16px; border-radius: var(--radius-medium); font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; box-shadow: 0 4px 0 #6D28D9; }
        .btn-music:active { transform: translateY(4px); box-shadow: none; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: white; display: flex; gap: 12px; align-items: flex-end; z-index: 50; border-top: 3px solid #E2E8F0; }
        .btn-call-main { flex-grow: 1; background: var(--video-color); color: white; border: none; height: 90px; border-radius: 45px; font-size: 24px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; box-shadow: 0 8px 0 #047857; }
        .btn-sos-main { width: 110px; flex-shrink: 0; background: var(--sos-color); color: white; border: none; height: 90px; border-radius: 45px; font-size: 18px; font-weight: 700; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; box-shadow: 0 8px 0 #7F1D1D; }
        .btn-1669 { width: 90px; flex-shrink: 0; background: #EA580C; color: white; border: none; height: 90px; border-radius: 45px; font-size: 18px; font-weight: 700; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; text-decoration: none; box-shadow: 0 8px 0 #C2410C; }
        
        .btn-call-main:active, .btn-sos-main:active, .btn-1669:active { transform: translateY(8px); box-shadow: none; }

        #video-modal, #music-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0F172A; z-index: 10000; flex-direction: column; }
        .video-header { padding: 20px; background: #1E293B; display: flex; justify-content: space-between; align-items: center; }
        #jitsi-container, #yt-container { flex-grow: 1; width: 100%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="video-modal">
        <div class="video-header">
            <span style="color: white; font-size: 24px; font-weight: 700;"><i class="fa-solid fa-video"></i> คุยกับลูกหลาน</span>
            <button onclick="endVideoCall()" style="background: #EF4444; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 20px; font-weight: 700; cursor: pointer;"><i class="fa-solid fa-phone-slash"></i> วางสาย</button>
        </div>
        <div id="jitsi-container"></div>
    </div>

    <div id="music-modal">
        <div class="video-header">
            <span style="color: white; font-size: 24px; font-weight: 700;"><i class="fa-solid fa-music"></i> ฟังเพลงแก้เหงา</span>
            <button onclick="closeMusic()" style="background: #EF4444; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 20px; font-weight: 700; cursor: pointer;"><i class="fa-solid fa-xmark"></i> ปิดหน้าจอ</button>
        </div>
        <div id="yt-container">
            <iframe id="yt-player" width="100%" height="80%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="header">
        <div class="avatar"></div>
        <div class="greeting">
            <h1>สวัสดีครับ คุณตา</h1>
            <p>กำลังเชื่อมต่อข้อมูลลูกหลาน...</p>
        </div>
    </div>

    <div class="bento-grid">
        <div class="card card-wide">
            <div class="card-header"><i class="fa-solid fa-clipboard-question" style="color:#D97706"></i> วันนี้คุณตารู้สึกอย่างไรบ้าง?</div>
            <div class="mood-grid">
                <button class="mood-btn" onclick="sendMood(this, '😁 สบายดี')">
                    <span class="mood-emoji">😁</span><span class="mood-text">สบายดี</span>
                </button>
                <button class="mood-btn" onclick="sendMood(this, '🤒 ปวดเมื่อย/ไม่สบาย')">
                    <span class="mood-emoji">🤒</span><span class="mood-text">ปวดเมื่อย</span>
                </button>
                <button class="mood-btn" onclick="sendMood(this, '😢 เหงา/อยากคุยด้วย')">
                    <span class="mood-emoji">😢</span><span class="mood-text">เหงาจัง</span>
                </button>
            </div>
        </div>

        <div class="card card-wide">
            <div class="card-header"><i class="fa-solid fa-pills" style="color:#EA580C"></i> ตารางกินยา</div>
            <div class="pill-item">
                <div class="pill-img"></div>
                <div class="pill-info">
                    <div class="pill-title" id="pill-desc">กำลังโหลดข้อมูลยา...</div>
                </div>
                <button class="btn-pill" id="btn-pill" onclick="markPillDone()">กินแล้ว</button>
            </div>
        </div>

        <div class="card card-wide">
            <div class="card-header"><i class="fa-regular fa-calendar-check" style="color:#7C3AED"></i> นัดพบหมอ</div>
            <div class="appointment-box">
                <div><div id="appoint-desc" style="font-size: 20px; font-weight: 700;">กำลังโหลดข้อมูลนัด...</div></div>
                <button class="btn-ride" onclick="callGrab()"><i class="fa-solid fa-car"></i> เรียกรถ</button>
            </div>
        </div>

        <div class="card card-wide">
            <button class="btn-music" onclick="openMusic()">
                <i class="fa-solid fa-radio fa-bounce"></i> เปิดเพลงลูกกรุง / ฟังธรรมะ
            </button>
        </div>

        <div class="card card-wide">
            <div class="card-header"><i class="fa-solid fa-images" style="color:#059669"></i> รูปล่าสุดจากลูกหลาน</div>
            <div class="gallery-container" id="gallery"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-call-main" onclick="startVideoCall('คุณตา')">
            <i class="fa-solid fa-video fa-beat"></i> คุยกับหลาน
        </button>
        <button class="btn-sos-main" id="btn-sos" onclick="executeSOS()">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 26px;"></i> ลูกหลาน
        </button>
        <a href="tel:1669" class="btn-1669">
            <i class="fa-solid fa-truck-medical" style="font-size: 26px;"></i> 1669
        </a>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycby8enGt2JJA8RwqoyX4xcQXGjpDBVpGly5QKxM_WrR5hMJqEW2gJu_rCL6063BNXPY/exec";
        let isProcessingSOS = false; let voiceEnabled = false;

        function speakThai(text) {
            if ('speechSynthesis' in window && voiceEnabled) {
                window.speechSynthesis.cancel(); 
                let msg = new SpeechSynthesisUtterance(text); msg.lang = 'th-TH'; msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        }

        document.body.addEventListener('click', () => { voiceEnabled = true; }, {once: true});

        let api = null;
        function startVideoCall(userName) {
            speakThai("กำลังเปิดกล้อง เพื่อคุยกับลูกหลานครับ");
            document.getElementById('video-modal').style.display = 'flex';
            const domain = 'meet.jit.si';
            const options = {
                roomName: 'FamilyCare_PrivateRoom_889922', width: '100%', height: '100%',
                parentNode: document.querySelector('#jitsi-container'), userInfo: { displayName: userName },
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera'], SHOW_JITSI_WATERMARK: false }
            };
            api = new JitsiMeetExternalAPI(domain, options);
            api.addListener('videoConferenceLeft', () => { endVideoCall(); });
        }

        function endVideoCall() {
            if(api) { api.dispose(); api = null; }
            document.getElementById('video-modal').style.display = 'none';
            speakThai("วางสายเรียบร้อยแล้วครับ");
        }

        function openMusic() {
            speakThai("เปิดเพลงให้ฟังแล้วครับ");
            document.getElementById('music-modal').style.display = 'flex';
            document.getElementById('yt-player').src = "https://www.youtube.com/embed/videoseries?list=PLB5A6513A5C59F9F8&autoplay=1"; 
        }

        function closeMusic() {
            document.getElementById('music-modal').style.display = 'none';
            document.getElementById('yt-player').src = "";
        }

        function sendMood(btnElement, moodText) {
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            speakThai("ส่งความรู้สึกให้ลูกหลานแล้วครับ");
            sendToBackend({ action: "mood", detail: moodText });
        }

        async function fetchAdminUpdates() {
            try {
                const response = await fetch(scriptUrl); const result = await response.json();
                if (result.status === "success") {
                    const rows = result.data.reverse(); 
                    let foundAppoint = false, foundPill = false, foundPhoto = false;

                    for (let row of rows) {
                        let action = row[1], detail = row[2];
                        if (action === "save_appointment" && !foundAppoint) { document.getElementById('appoint-desc').innerText = detail.replace("เพิ่มนัดหมอ: ", ""); foundAppoint = true; }
                        if (action === "save_pill" && !foundPill) { document.getElementById('pill-desc').innerText = detail.replace("ตารางยา: ", ""); foundPill = true; }
                        if (action === "save_photo" && !foundPhoto) { document.getElementById('gallery').style.backgroundImage = `url('${detail.replace("อัปเดตแกลเลอรี่: ", "")}')`; foundPhoto = true; }
                    }
                    if(!foundAppoint) document.getElementById('appoint-desc').innerText = "ยังไม่มีนัดหมายหมอ";
                    if(!foundPill) document.getElementById('pill-desc').innerText = "ยังไม่มีตารางยา";
                }
            } catch (e) { console.log("Sync Error"); }
        }

        window.onload = () => { fetchAdminUpdates(); setInterval(fetchAdminUpdates, 15000); };

        function sendToBackend(actionData) {
            fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(actionData), headers: { "Content-Type": "text/plain;charset=utf-8" }});
        }

        function executeSOS() {
            if(isProcessingSOS) return;
            isProcessingSOS = true; let btn = document.getElementById('btn-sos');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            speakThai("กำลังส่งสัญญาณฉุกเฉินหาลูกหลานครับ");

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    sendToBackend({ action: "sos", lat: pos.coords.latitude, lng: pos.coords.longitude });
                    btn.innerHTML = '<i class="fa-solid fa-check"></i>'; setTimeout(() => { resetSOS(btn); }, 15000);
                }, (err) => {
                    sendToBackend({ action: "sos", lat: 0, lng: 0 }); resetSOS(btn);
                }, { enableHighAccuracy: true, timeout: 10000 });
            }
        }

        function resetSOS(btn) { isProcessingSOS = false; btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="font-size: 26px;"></i> ลูกหลาน'; }

        function markPillDone() {
            let btn = document.getElementById('btn-pill');
            btn.innerHTML = "<i class='fa-solid fa-check'></i> ทานแล้ว"; btn.disabled = true;
            speakThai("เก่งมากครับ ระบบบันทึกการกินยาให้แล้วครับ");
            sendToBackend({ action: "pill" });
        }

        function callGrab() { window.open("https://grab.onelink.me/2695613898?pid=inapp", "_blank"); }
    </script>
</body>
</html>
